<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>THALA 7</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="header">
            <div class="container">
                <nav class="nav-bar">
                    <div class="logo">
                        <h1>Thala 7</h1>
                    </div>
                    <ul class="nav-links">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#about">About</a></li>
                        <li><a href="#brands">Brands</a></li>
                        <li><a href="#more">More</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>
                    <div class="profile">
                        <input type="search">
                        <img class="icon" src="https://i1-e.pinimg.com/736x/3d/2a/d8/3d2ad85a25b0485d9ecedfc8f515f812.jpg" alt="shopping-icon">
                        <img class="pfp" src="https://i1-e.pinimg.com/736x/c8/79/e5/c879e533eaa8c05008b6567e5103b52a.jpg" alt="profile-pic">
                    </div>
                </nav>
            </div>
        </header>

        <main>
            <section class="shopping-cart">
                <div class="shopping-cart-section">
                    <div class="shopping-cart-heading">
                        <h2>Shopping Cart</h2>
                        <div class="items">
                            <table>
                                <tr>
                                    <th>Product</th>
                                    <th>Quantity</th>
                                    <th>Price</th>
                                    <th>Remove?</th>
                                </tr>
                                <tr>
                                    <td>Seven by M.S.Dhoni...</td>
                                    <td>1</td>
                                    <td>$4,999</td>
                                    <td>❌</td>
                                </tr>
                                <tr>
                                    <td>Seven by M.S.Dhoni...</td>
                                    <td>1</td>
                                    <td>$4,999</td>
                                    <td>❌</td>
                                </tr>
                                <tr>
                                    <td>Seven by M.S.Dhoni...</td>
                                    <td>1</td>
                                    <td>$4,999</td>
                                    <td>❌</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                    <div class="bill">
                        <div class="bill-details">
                            <label for="code">Enter Coupon Code</label>
                            <input type="text" name="code" id="code">
                            <button>Apply Coupon</button>
                            <table>
                                <tr>
                                    <td>Sub Total</td>
                                    <td>$4,700</td>
                                </tr>
                                <tr>
                                    <td>Taxes(if applicable)</td>
                                    <td>$199</td>
                                </tr>
                                <tr>
                                    <td>Discount</td>
                                    <td>$0</td>
                                </tr>
                                <tr>
                                    <td>Total</td>
                                    <td>$4,999</td>
                                </tr>
                            </table>
                        </div>
                        <button>Pay Now $4,999</button>
                        <div class="payment-method">
                            <img src="https://coralogix.com/wp-content/webp-express/webp-images/doc-root/wp-content/uploads/2025/01/1.jpg.webp" alt="razorpay-image" width="210" height="98">
                        </div>
                    </div>
                </div>
                <a href="product-display.html">Continue Shopping</a>
            </section>
        </main>
    </body>
</html>
